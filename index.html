<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>情绪解谜馆</title>
    <style>
        /* ==================== 全局样式 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        /* ==================== 游戏容器 ==================== */
        #game-container {
            width: 750px;
            height: 1334px;
            max-width: 100vw;
            max-height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        
        #game-root {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        /* ==================== 文字样式 ==================== */
        .title {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 56px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 4px 20px rgba(255, 255, 255, 0.5);
            top: 120px;
            animation: titlePulse 2s ease-in-out infinite;
        }
        
        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        .normal-text {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.9);
            left: 0;
        }
        
        /* ==================== 按钮样式 ==================== */
        .game-btn {
            position: absolute;
            width: 400px;
            height: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-size: 36px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        .game-btn:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 107, 107, 0.6);
        }
        
        .game-btn:active {
            transform: translateX(-50%) scale(0.98);
        }
        
        .game-btn:nth-of-type(1) { top: 350px; }
        .game-btn:nth-of-type(2) { top: 500px; }
        
        /* ==================== 关卡容器 ==================== */
        .level-container {
            position: absolute;
            top: 250px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        /* 星星按钮 */
        .star-btn {
            width: 100px;
            height: 100px;
            font-size: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid rgba(255, 215, 0, 0.5);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .star-btn:hover {
            background: rgba(255, 215, 0, 0.3);
            transform: scale(1.1);
        }
        
        .star-btn.clicked {
            background: #ffd700;
            border-color: #ffd700;
            animation: starClick 0.5s ease;
        }
        
        @keyframes starClick {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        
        /* 规律按钮 */
        .pattern-btn {
            width: 100px;
            height: 100px;
            font-size: 40px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .pattern-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }
        
        .pattern-btn.special {
            background: rgba(255, 105, 180, 0.3);
            border-color: rgba(255, 105, 180, 0.6);
            animation: specialPulse 1.5s ease-in-out infinite;
        }
        
        @keyframes specialPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 105, 180, 0.5); }
            50% { box-shadow: 0 0 30px rgba(255, 105, 180, 0.8); }
        }
        
        /* ==================== 奖励弹窗 ==================== */
        .reward-dialog {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: dialogFadeIn 0.3s ease;
        }
        
        @keyframes dialogFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .dialog-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 60px;
            border-radius: 30px;
            text-align: center;
            animation: dialogScale 0.3s ease;
        }
        
        @keyframes dialogScale {
            from { transform: scale(0.8); }
            to { transform: scale(1); }
        }
        
        .dialog-content h2 {
            color: #fff;
            font-size: 48px;
            margin-bottom: 40px;
        }
        
        .dialog-content .bottle {
            width: 200px;
            height: 280px;
            margin: 0 auto 30px;
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            color: #fff;
            font-weight: bold;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: bottleFloat 2s ease-in-out infinite;
        }
        
        @keyframes bottleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .dialog-content p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 28px;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .dialog-content button {
            width: 250px;
            height: 80px;
            background: #fff;
            border: none;
            border-radius: 40px;
            font-size: 32px;
            color: #667eea;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* ==================== 收藏网格 ==================== */
        .collection-grid {
            position: absolute;
            top: 250px;
            width: 90%;
            left: 5%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .bottle-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            color: #fff;
            font-size: 28px;
        }
        
        .share-btn {
            display: block;
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }
        
        /* ==================== 提示 ==================== */
        .tip {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 30px 50px;
            border-radius: 20px;
            font-size: 32px;
            animation: tipFade 2s ease forwards;
            z-index: 500;
        }
        
        @keyframes tipFade {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        /* ==================== 数学题按钮 ==================== */
        .math-btn {
            width: 120px;
            height: 80px;
            margin: 10px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            color: #fff;
            font-size: 32px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .math-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }
        
        /* ==================== 记忆按钮 ==================== */
        .memory-btn {
            width: 100px;
            height: 100px;
            margin: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 20px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .memory-btn:active {
            transform: scale(0.95);
        }
        
        /* ==================== 计时器 ==================== */
        .timing-container {
            position: absolute;
            width: 320px;
            height: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            overflow: hidden;
            cursor: pointer;
        }
        
        .timing-zone {
            position: absolute;
            left: 120px;
            width: 80px;
            height: 100%;
            background: rgba(255, 99, 71, 0.6);
            border-radius: 30px;
        }
        
        .timing-indicator {
            position: absolute;
            width: 6px;
            height: 100%;
            background: #fff;
            border-radius: 3px;
            top: 0;
            left: 0;
        }
        
        /* ==================== 拼图块 ==================== */
        .puzzle-block {
            width: 120px;
            height: 120px;
            margin: 10px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }
        
        .puzzle-block:hover {
            transform: scale(1.05);
            border-color: #fff;
        }
        
        /* ==================== 计数圆圈 ==================== */
        .count-circle {
            width: 80px;
            height: 80px;
            font-size: 50px;
            color: #87CEEB;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px;
        }
        
        .answer-row {
            position: absolute;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        
        /* ==================== 颜色选择按钮 ==================== */
        .color-btn {
            width: 120px;
            height: 120px;
            margin: 15px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .color-btn:hover {
            transform: scale(1.1);
            border-color: #fff;
        }
        
        /* ==================== 滑块 ==================== */
        .slider-track {
            position: absolute;
            width: 500px;
            height: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        
        .slider-thumb {
            position: absolute;
            width: 50px;
            height: 50px;
            top: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            border-radius: 50%;
            cursor: grab;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        
        /* ==================== 长按按钮 ==================== */
        .long-press-btn {
            position: absolute;
            width: 300px;
            height: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-size: 32px;
            cursor: pointer;
        }
        
        /* ==================== 滑动箭头 ==================== */
        .swipe-arrow {
            position: absolute;
            width: 100px;
            height: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 60px;
            animation: swipeHint 1s ease infinite;
        }
        
        @keyframes swipeHint {
            0%, 100% { transform: translateX(-50%) translateX(-30px); opacity: 0.5; }
            50% { transform: translateX(-50%) translateX(30px); opacity: 1; }
        }
        
        /* ==================== 泡泡 ==================== */
        .bubble {
            position: absolute;
            cursor: pointer;
            transition: transform 0.2s ease;
            user-select: none;
        }
        
        .bubble:hover {
            transform: scale(1.1);
        }
        
        .bubble.popped {
            animation: pop 0.3s ease forwards;
        }
        
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.5); }
            100% { transform: scale(0); opacity: 0; }
        }
        
        /* ==================== 重力 ==================== */
        .gravity-box {
            position: absolute;
            width: 200px;
            height: 100px;
            left: 50%;
            transform: translateX(-50%);
            border: 3px dashed rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            display: flex;
            justify-content: center;
        }
        
        .gravity-star {
            font-size: 40px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .gravity-star.falling {
            animation: fallDown 0.5s ease forwards;
        }
        
        @keyframes fallDown {
            0% { transform: translateY(0); }
            100% { transform: translateY(60px); }
        }
        
        /* ==================== 灯泡 ==================== */
        .light-cell {
            display: inline-block;
            transition: background 0.3s ease;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        
        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.5); }
        }
        
        /* ==================== 背景动画 ==================== */
        .bg-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }
        
        .floating-bottle {
            position: absolute;
            width: 40px;
            height: 60px;
            border-radius: 10px;
            opacity: 0.3;
            animation: floatBottle 8s ease-in-out infinite;
        }
        
        @keyframes floatBottle {
            0%, 100% { 
                transform: translateY(0) rotate(0deg);
                opacity: 0.2;
            }
            50% { 
                transform: translateY(-100px) rotate(180deg);
                opacity: 0.4;
            }
        }
        
        /* ==================== 响应式 ==================== */
        @media (max-width: 750px) {
            #game-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }
            
            .title { font-size: 42px; }
            .normal-text { font-size: 24px; }
            .game-btn { 
                width: 70%; 
                height: 80px;
                font-size: 28px;
            }
            .game-btn:nth-of-type(1) { top: 280px; }
            .game-btn:nth-of-type(2) { top: 400px; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="game-root"></div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
